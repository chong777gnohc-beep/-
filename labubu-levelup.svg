<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- 背景光晕 -->
  <circle cx="100" cy="120" r="95" fill="#FFF9C4" opacity="0.3"/>
  <!-- 星星 -->
  <text x="20" y="30" font-size="18">⭐</text>
  <text x="50" y="20" font-size="14">✨</text>
  <text x="140" y="25" font-size="16">⭐</text>
  <text x="165" y="45" font-size="14">✨</text>
  <text x="100" y="15" font-size="16">🌟</text>
  <!-- 身体 -->
  <ellipse cx="100" cy="158" rx="65" ry="75" fill="#B8D4E3"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="173" rx="45" ry="50" fill="#D4EAF5"/>
  <!-- 头 -->
  <ellipse cx="100" cy="92" rx="60" ry="58" fill="#B8D4E3"/>
  <!-- 左耳 -->
  <ellipse cx="50" cy="52" rx="22" ry="28" fill="#B8D4E3" transform="rotate(-15 50 52)"/>
  <ellipse cx="50" cy="52" rx="12" ry="16" fill="#8FBCD9" transform="rotate(-15 50 52)"/>
  <!-- 右耳 -->
  <ellipse cx="150" cy="52" rx="22" ry="28" fill="#B8D4E3" transform="rotate(15 150 52)"/>
  <ellipse cx="150" cy="52" rx="12" ry="16" fill="#8FBCD9" transform="rotate(15 150 52)"/>
  <!-- 左眼（闪闪发光） -->
  <ellipse cx="78" cy="88" rx="20" ry="22" fill="white"/>
  <ellipse cx="80" cy="92" rx="13" ry="15" fill="#2D3436"/>
  <circle cx="84" cy="86" r="5" fill="white"/>
  <circle cx="78" cy="95" r="3" fill="white" opacity="0.6"/>
  <!-- 右眼 -->
  <ellipse cx="122" cy="88" rx="20" ry="22" fill="white"/>
  <ellipse cx="124" cy="92" rx="13" ry="15" fill="#2D3436"/>
  <circle cx="128" cy="86" r="5" fill="white"/>
  <circle cx="122" cy="95" r="3" fill="white" opacity="0.6"/>
  <!-- 眉毛（超开心） -->
  <path d="M62 68 Q78 60 90 70" stroke="#2D3436" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M110 70 Q122 60 138 68" stroke="#2D3436" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <ellipse cx="100" cy="108" rx="7" ry="5" fill="#8FBCD9"/>
  <!-- 嘴巴（大笑） -->
  <path d="M75 116 Q100 148 125 116" stroke="#2D3436" stroke-width="4" fill="#FFCDD2" stroke-linecap="round"/>
  <path d="M82 130 Q100 140 118 130" fill="white" opacity="0.8"/>
  <!-- 腮红 -->
  <ellipse cx="54" cy="104" rx="14" ry="9" fill="#FFB3BA" opacity="0.7"/>
  <ellipse cx="146" cy="104" rx="14" ry="9" fill="#FFB3BA" opacity="0.7"/>
  <!-- 手臂张开庆祝 -->
  <ellipse cx="28" cy="145" rx="22" ry="14" fill="#B8D4E3" transform="rotate(-55 28 145)"/>
  <ellipse cx="172" cy="145" rx="22" ry="14" fill="#B8D4E3" transform="rotate(55 172 145)"/>
  <!-- 脚 -->
  <ellipse cx="72" cy="230" rx="25" ry="12" fill="#B8D4E3"/>
  <ellipse cx="128" cy="230" rx="25" ry="12" fill="#B8D4E3"/>
</svg>
