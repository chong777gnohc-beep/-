<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- 身体 -->
  <ellipse cx="100" cy="160" rx="65" ry="75" fill="#B8D4E3"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="175" rx="45" ry="50" fill="#D4EAF5"/>
  <!-- 头 -->
  <ellipse cx="100" cy="95" rx="60" ry="58" fill="#B8D4E3"/>
  <!-- 左耳 -->
  <ellipse cx="52" cy="55" rx="22" ry="28" fill="#B8D4E3" transform="rotate(-15 52 55)"/>
  <ellipse cx="52" cy="55" rx="12" ry="16" fill="#8FBCD9" transform="rotate(-15 52 55)"/>
  <!-- 右耳 -->
  <ellipse cx="148" cy="55" rx="22" ry="28" fill="#B8D4E3" transform="rotate(15 148 55)"/>
  <ellipse cx="148" cy="55" rx="12" ry="16" fill="#8FBCD9" transform="rotate(15 148 55)"/>
  <!-- 左眼白 -->
  <ellipse cx="78" cy="88" rx="18" ry="20" fill="white"/>
  <!-- 右眼白 -->
  <ellipse cx="122" cy="88" rx="18" ry="20" fill="white"/>
  <!-- 左眼珠 -->
  <ellipse cx="82" cy="92" rx="11" ry="13" fill="#2D3436"/>
  <!-- 右眼珠 -->
  <ellipse cx="126" cy="92" rx="11" ry="13" fill="#2D3436"/>
  <!-- 左眼高光 -->
  <circle cx="85" cy="88" r="4" fill="white"/>
  <circle cx="79" cy="95" r="2" fill="white" opacity="0.6"/>
  <!-- 右眼高光 -->
  <circle cx="129" cy="88" r="4" fill="white"/>
  <circle cx="123" cy="95" r="2" fill="white" opacity="0.6"/>
  <!-- 眉毛（开心眯眯眼） -->
  <path d="M66 76 Q78 72 88 76" stroke="#2D3436" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M112 76 Q122 72 134 76" stroke="#2D3436" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 鼻子 -->
  <ellipse cx="100" cy="108" rx="7" ry="5" fill="#8FBCD9"/>
  <!-- 嘴巴（大笑脸） -->
  <path d="M78 118 Q100 145 122 118" stroke="#2D3436" stroke-width="3.5" fill="#FFCDD2" stroke-linecap="round"/>
  <path d="M85 128 Q100 135 115 128" fill="white" opacity="0.7"/>
  <!-- 腮红 -->
  <ellipse cx="58" cy="105" rx="14" ry="9" fill="#FFB3BA" opacity="0.7"/>
  <ellipse cx="142" cy="105" rx="14" ry="9" fill="#FFB3BA" opacity="0.7"/>
  <!-- 举起的手臂 -->
  <ellipse cx="35" cy="145" rx="20" ry="14" fill="#B8D4E3" transform="rotate(-45 35 145)"/>
  <ellipse cx="165" cy="145" rx="20" ry="14" fill="#B8D4E3" transform="rotate(45 165 145)"/>
  <!-- 脚 -->
  <ellipse cx="72" cy="232" rx="25" ry="12" fill="#B8D4E3"/>
  <ellipse cx="128" cy="232" rx="25" ry="12" fill="#B8D4E3"/>
  <!-- 星星装饰 -->
  <text x="25" y="45" font-size="18">⭐</text>
  <text x="160" y="45" font-size="18">⭐</text>
  <text x="155" y="70" font-size="14">✨</text>
  <text x="30" y="70" font-size="14">✨</text>
</svg>
